# =============================================================================
# motd — corporate configuration example
# -----------------------------------------------------------------------------
# Profile: English-language pre-login banner with the heavy double-line
# style, contact line set, dynamic MOTD enabled with the safe-default
# (non-verbose) section visibility, no footer line.
#
# Suitable for any internal corporate fleet that wants:
#   - a serious-looking pre-login warning with a contact email
#   - the post-login system dashboard turned on
#   - kernel version and public IP kept off the screen (CIS L1)
#   - Recent Logins still on so the operator sees their own session history
#
# Apply with:
#     sudo ./install.sh --config examples/config-corporate.conf
# =============================================================================

# Scope flags (banner on/off, MOTD on/off, sshd-banner on/off) are
# CLI-only — use --no-banner / --no-motd / --no-sshd-banner or the
# --banner-only / --motd-only aliases. They are intentionally NOT
# readable from this file; a one-off `--motd-only` install must not
# silently disable the banner for every subsequent run.

# ── Banner ──
COMPANY_NAME="Acme Corporation"
CONTACT="security@acme.example"
LANGUAGE="en"
STYLE="double"
MIN_WIDTH=64
STATUTE="§202a StGB"
STATUTE_ASCII="section 202a StGB"
CLEAR_MOTD=true

# ── MOTD ──
MOTD_SUBTITLE=" · Managed Server"
MOTD_MIN_WIDTH=58
MOTD_VERBOSE=false        # CIS L1 §1.7.x — keep kernel and public IP private
MOTD_FOOTER=""            # silent footer; brand stays in the header box only
MOTD_SHOW_SERVICES=true
MOTD_SHOW_UPDATES=true
MOTD_SHOW_RECENT_LOGINS=true

# ── sshd integration ──
SSHD_RELOAD=true

# ── Backups ──
BACKUP=true
BACKUP_DIR="/var/backups/motd"
